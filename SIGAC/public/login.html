<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sigac</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="title">Fazer Login</div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email:</label>
          <input type="email" id="loginEmail" name="email" placeholder="Digitar..." required>
        </div>

        <div class="form-group">
          <label for="loginSenha">Senha:</label>
          <input type="password" id="loginSenha" name="senha" placeholder="Digitar..." required>
        </div>

        <button type="submit">Finalizar</button>

        <div class="link-area">
          <a href="cadastro.html">Não tenho conta</a>
        </div>

        <p id="loginMsg" class="message"></p>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
