<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Sigac</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="badges">
        <div class="badge-shadow"></div>
        <div class="badge">E</div>
        <div class="badge">J</div>
      </div>

      <div class="title">Cadastre-se</div>

      <form id="cadastroForm">
        <div class="form-group">
          <label for="nome">Nome:</label>
          <input type="text" id="nome" name="nome" placeholder="Digitar..." required>
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="Digitar..." required>
        </div>

        <div class="form-group">
          <label for="curso_periodo">Curso e período:</label>
          <input type="text" id="curso_periodo" name="curso_periodo" placeholder="Digitar..." required>
        </div>

        <div class="form-group">
          <label for="senha">Crie uma senha:</label>
          <input type="password" id="senha" name="senha" placeholder="Digitar..." required>
        </div>

        <div class="form-group">
          <label for="confirmarSenha">Confirmar senha:</label>
          <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Digitar..." required>
        </div>

        <button type="submit">Finalizar</button>

        <div class="link-area">
          <a href="login.html">Já tenho conta</a>
        </div>

        <p id="cadastroMsg" class="message"></p>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
